<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSpoilers</title>
</head>
<body>
    <h1>Movies</h1>

    {% for movie in movies %}
        <div>
            <h2>{{ movie.title }}</h2>
            <p>{{ movie.synopsis }}</p>
            <small>{{ movie.release_date }}</small>
        </div>
        <hr>
    {% empty %}
        <p>No movies available.</p>
    {% endfor %}
</body>
</html>
